appId: com.zhi.browser
productName: Zhi Browser

protocols:
  name: Zhi Browser URL
  schemes:
    - http
    - https
    - zhi

fileAssociations:
  - ext: html
    name: HTML Document
    role: Viewer
  - ext: htm
    name: HTML Document
    role: Viewer

directories:
  buildResources: build
  output: dist

files:
  - out/**
  - resources/**
  - package.json

asarUnpack:
  - resources/**

extraResources:
  - from: resources/mihomo.exe
    to: mihomo.exe

win:
  executableName: zhi-browser
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64

nsis:
  artifactName: Zhi Browser Setup ${version}.${ext}
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Zhi Browser
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  installerSidebar: build/installerSidebar.bmp
  uninstallerSidebar: build/installerSidebar.bmp
  installerHeader: build/installerHeader.bmp

mac:
  icon: build/icon.icns
  entitlementsInherit: build/entitlements.mac.plist

linux:
  target:
    - AppImage
  maintainer: zhi
  category: Utility
